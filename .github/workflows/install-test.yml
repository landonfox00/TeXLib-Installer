name: install-test

on:
  push:
  schedule:
    # Daily 06:13 UTC: hash-rot canary (verify-downloads only).
    - cron: '13 6 * * *'
    # Weekly Mon 04:30 UTC: real full-install end-to-end (full-install only).
    - cron: '30 4 * * 1'
  workflow_dispatch:
    inputs:
      full:
        description: 'Run the slow real full-install + Doctor + uninstall job'
        type: boolean
        required: false
        default: false

# Keep the event type in the group key so a push, a workflow_dispatch, and a
# schedule run land in SEPARATE concurrency groups. Pushes and scheduled/
# dispatched runs share a ref (refs/heads/main), and a *starting* run with
# cancel-in-progress=true cancels other in-progress runs in its group -- so
# without the event_name split, merging a PR (a push to main) would cancel an
# in-flight full-install. cancel-in-progress stays push-only, so successive
# pushes supersede each other but never kill a long dispatched/scheduled run.
concurrency:
  group: install-test-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. encoding-guard — FAST. Fails if install.ps1 / uninstall.ps1 ever regress
  #    to UTF-8 *without* a BOM while containing non-ASCII (em-dashes). That
  #    exact condition makes Windows PowerShell 5.1 (what install.bat launches)
  #    decode the script as Windows-1252 and abort with a parse error before
  #    running a line — the bug that shipped in v0.5.0. This guard makes the
  #    regression impossible to merge unnoticed.
  # ---------------------------------------------------------------------------
  encoding-guard:
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Assert install.ps1 / uninstall.ps1 are UTF-8 with BOM
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bad = @()
          foreach ($f in 'install.ps1','uninstall.ps1') {
            $b = [System.IO.File]::ReadAllBytes((Resolve-Path $f))
            $hasBom = ($b.Length -ge 3 -and $b[0] -eq 0xEF -and $b[1] -eq 0xBB -and $b[2] -eq 0xBF)
            $nonAscii = ($b | Where-Object { $_ -ge 0x80 }).Count
            Write-Host ("{0}: BOM={1} nonAscii={2}" -f $f, $hasBom, $nonAscii)
            if ((-not $hasBom) -and $nonAscii -gt 0) { $bad += $f }
          }
          if ($bad.Count) {
            Write-Host "FAIL: non-ASCII without a UTF-8 BOM -> WinPS 5.1 will not parse: $($bad -join ', ')" -ForegroundColor Red
            exit 1
          }
          Write-Host "Encoding guard passed." -ForegroundColor Green

  # ---------------------------------------------------------------------------
  # 1b. wrapper-arg-forwarding — FAST. Regression for the v0.6.0 uninstaller
  #     crash: a no-arg launch (normal double-click) left $InnerArgs = $null, and
  #     `& $Inner @InnerArgs` splatted a lone $null as a POSITIONAL argument.
  #     uninstall.ps1 has only [switch]$Silent (no positional-capable param), so
  #     WinPS 5.1 aborted with "A positional parameter cannot be found that
  #     accepts argument '$null'" BEFORE uninstalling anything. install.ps1 only
  #     dodged it because its [string]$InstallPath positional absorbed the null.
  #     Drives the REAL boot_wrapper.ps1 against a stub inner script whose param
  #     block matches uninstall.ps1 (switch-only), reproducing the exact crash
  #     condition, and asserts it does not recur. The other jobs run install.ps1
  #     directly and never exercise the wrapper's splat, so this is the only
  #     guard for it.
  # ---------------------------------------------------------------------------
  wrapper-arg-forwarding:
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: boot_wrapper.ps1 forwards zero inner args without a stray $null
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Assemble a sandbox mirroring the release layout (tools\ one level
          # below the inner script) so the REAL wrapper's Split-Path resolution
          # finds our stub as the sibling '<Kind>.ps1'.
          $sandbox = Join-Path $env:RUNNER_TEMP 'wrap-arg-test'
          Remove-Item -Recurse -Force $sandbox -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path (Join-Path $sandbox 'tools') | Out-Null
          Copy-Item .\tools\boot_wrapper.ps1 (Join-Path $sandbox 'tools\boot_wrapper.ps1')
          # Stub inner script with uninstall.ps1's exact switch-only signature.
          $stub = @(
            '[CmdletBinding()]'
            'param([switch]$Silent)'
            'Write-Host "STUB-INNER-RAN Silent=$Silent"'
            'exit 0'
          ) -join "`r`n"
          Set-Content -Encoding UTF8 -Path (Join-Path $sandbox 'uninstall.ps1') -Value $stub

          # Launch exactly as uninstall.bat does: WinPS 5.1, -File, positional
          # 'uninstall', NO further args. `type nul |` feeds a closed, empty
          # stdin so the wrapper's final Read-Host returns at once instead of
          # hanging the headless job.
          $wrapper = Join-Path $sandbox 'tools\boot_wrapper.ps1'
          $out = & cmd /c "type nul | powershell.exe -NoProfile -ExecutionPolicy Bypass -File `"$wrapper`" uninstall" 2>&1 | Out-String
          $rc = $LASTEXITCODE
          Write-Host $out
          Write-Host "wrapper exit code: $rc"

          if ($out -match 'positional parameter cannot be found') {
            Write-Host "FAIL: the stray-`$null splat regressed." -ForegroundColor Red; exit 1
          }
          if ($out -notmatch 'STUB-INNER-RAN') {
            Write-Host "FAIL: inner script never ran through the wrapper." -ForegroundColor Red; exit 1
          }
          if ($rc -ne 0) {
            Write-Host "FAIL: wrapper exited $rc (expected 0)." -ForegroundColor Red; exit 1
          }
          Write-Host "OK: boot_wrapper forwards zero inner args cleanly." -ForegroundColor Green

  # ---------------------------------------------------------------------------
  # 2. verify-downloads — FAST hash-rot canary. Runs install.ps1 -VerifyDownloads
  #    (early-exit: downloads each pinned component, checks its SHA256/512, exits
  #    0 all-good / 20 drift) on a clean VM. Catches a vendor silently
  #    repackaging a pinned artifact before it breaks a coworker. Needs NO texlib
  #    bundle: -VerifyDownloads dispatches before pre-flight 7i.
  #    Runs on push, manual dispatch, and the daily 06:13 cron — not the weekly.
  # ---------------------------------------------------------------------------
  verify-downloads:
    if: github.event_name != 'schedule' || github.event.schedule == '13 6 * * *'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Guard — the -VerifyDownloads switch exists
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Fail fast (and legibly) if the switch was removed, rather than let
          # WinPS 5.1's CmdletBinding param-binding error surface as an opaque
          # exit 1 that looks just like a real hash drift.
          if (-not (Select-String -Path .\install.ps1 -Pattern 'VerifyDownloads' -Quiet)) {
            Write-Host "install.ps1 has no -VerifyDownloads switch; the canary cannot run." -ForegroundColor Red
            exit 1
          }

      - name: install.ps1 -VerifyDownloads
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # -Silent as defense-in-depth: if this mode ever fell through to
          # install logic it still could not block on a Read-Host. WRAPPED=1
          # suppresses the wrapper-style final pause belt-and-suspenders.
          $env:TEXLIB_INSTALLER_WRAPPED = '1'
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\install.ps1 -Silent -VerifyDownloads
          $rc = $LASTEXITCODE
          Write-Host "install.ps1 -VerifyDownloads exit code: $rc  (0=all good, 20=drift)"
          exit $rc

  # ---------------------------------------------------------------------------
  # 3. dry-run — FAST sanity check. Pre-flight + plan only, no disk changes.
  #    A stub texlib/ is staged so pre-flight 7i (the only hard bundle gate)
  #    passes; junction logic is observe-only in -DryRun and OneDrive is nulled
  #    so the junction branch is deterministically unreachable.
  #    NOTE: -DryRun runs the FULL pre-flight, including the fatal HEAD check to
  #    https://mirror.ctan.org/ (install.ps1). A transient CTAN mirror outage can
  #    red this job; a dry-run log showing ONLY that HEAD failure is infra flake,
  #    not an installer-logic defect.
  # ---------------------------------------------------------------------------
  dry-run:
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Assert source-download guidance when the texlib bundle is missing
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:TEXLIB_INSTALLER_WRAPPED = '1'
          $env:OneDrive = ''; $env:OneDriveCommercial = ''; $env:OneDriveConsumer = ''
          # No texlib\ staged yet. The checked-out source tree (has .git/.github/
          # tools) is exactly what a coworker gets from "Code -> Download ZIP", so
          # pre-flight must fail non-zero AND tell them to grab the release zip
          # instead -- the real-world failure from 2026-06-15.
          $out = & powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\install.ps1 -Silent -DryRun 2>&1 | Out-String
          $rc = $LASTEXITCODE
          Write-Host $out
          if ($rc -eq 0) { Write-Host "FAIL: expected non-zero exit when the bundle is missing" -ForegroundColor Red; exit 1 }
          if ($out -notmatch 'GitHub SOURCE download') { Write-Host "FAIL: source-download guidance not shown" -ForegroundColor Red; exit 1 }
          Write-Host "OK: missing-bundle pre-flight points users to the release zip." -ForegroundColor Green
          # $LASTEXITCODE is still 1 from the intentional non-zero -DryRun above;
          # exit 0 explicitly so the step passes once the assertions hold.
          exit 0

      - name: Stage stub texlib bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # install.ps1 requires a sibling texlib\ dir to clear pre-flight 7i in
          # EVERY mode (incl. -DryRun) or it aborts exit 1. Nothing parses the
          # .sty contents at install time, so a minimal stub suffices. Single-
          # line Set-Content avoids any here-string terminator pitfalls.
          New-Item -ItemType Directory -Force -Path 'texlib\Sublime' | Out-Null
          # 'Unreleased' top entry makes Show-VersionInfo skip the banner.
          Set-Content -Encoding UTF8 -Path 'texlib\CHANGELOG.md' -Value "# Changelog`r`n`r`n## [Unreleased]`r`n- CI stub bundle (not a real release)."

      - name: install.ps1 -DryRun
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:TEXLIB_INSTALLER_WRAPPED = '1'
          # Null OneDrive for the child so $NeedsUserRootJunction is
          # deterministically false regardless of runner provisioning.
          $env:OneDrive = ''
          $env:OneDriveCommercial = ''
          $env:OneDriveConsumer = ''
          $installRoot = Join-Path $env:RUNNER_TEMP 'TeXLibRoot'
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\install.ps1 -Silent -DryRun -InstallPath $installRoot
          $rc = $LASTEXITCODE
          Write-Host "install.ps1 -DryRun exit code: $rc"
          if ($rc -ne 0) {
            Write-Host "Expected exit 0 from -DryRun, got $rc" -ForegroundColor Red
          }
          exit $rc

  # ---------------------------------------------------------------------------
  # 4. junction — FAST. Exercises the OneDrive comma/space path that the v0.5.0
  #    user-root junction feature exists for, which CI otherwise never reaches
  #    (no OneDrive on the runner). Fakes $env:OneDrive to a comma+space path and
  #    runs -OnlyTeXLib (junction + bundle deploy, NOT the ~30 min TeX Live
  #    install), then asserts %USERPROFILE%\TeXLib is a junction pointing there.
  # ---------------------------------------------------------------------------
  junction:
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Stage stub texlib bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path 'texlib\Sublime' | Out-Null
          Set-Content -Encoding UTF8 -Path 'texlib\CHANGELOG.md' -Value "# Changelog`r`n`r`n## [Unreleased]`r`n- CI stub bundle (not a real release)."

      - name: Install with a faked comma/space OneDrive path
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:TEXLIB_INSTALLER_WRAPPED = '1'
          # Fake an OneDrive whose path has BOTH a space and a comma (like
          # "OneDrive - University of Nevada, Reno") so $NeedsUserRootJunction
          # fires -- the exact UNR environment GitHub runners never reproduce.
          $fakeOneDrive = Join-Path $env:RUNNER_TEMP 'OneDrive - Fake University, Org'
          New-Item -ItemType Directory -Force -Path (Join-Path $fakeOneDrive 'Documents') | Out-Null
          $env:OneDrive = $fakeOneDrive
          $env:OneDriveCommercial = ''
          $env:OneDriveConsumer = ''
          # -OnlyTeXLib exercises junction creation + bundle deploy WITHOUT the
          # ~30 min TeX Live full install.
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\install.ps1 -Silent -OnlyTeXLib
          $rc = $LASTEXITCODE
          Write-Host "install.ps1 -Silent -OnlyTeXLib exit code: $rc"
          if ($rc -ne 0) { exit $rc }

      - name: Assert the user-root junction was created correctly
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $junction = Join-Path $env:USERPROFILE 'TeXLib'
          if (-not (Test-Path $junction)) {
            Write-Host "FAIL: $junction was not created" -ForegroundColor Red; exit 1
          }
          $item = Get-Item $junction -Force
          if ($item.Attributes -notmatch 'ReparsePoint') {
            Write-Host "FAIL: $junction exists but is not a reparse point (junction)" -ForegroundColor Red; exit 1
          }
          $target = $item.Target; if (-not $target) { $target = $item.LinkTarget }
          $target = ($target -join ';')
          Write-Host "junction target: $target"
          if ($target -and ($target -notlike '*OneDrive - Fake University, Org*')) {
            Write-Host "FAIL: junction points somewhere unexpected" -ForegroundColor Red; exit 1
          }
          # The stub bundle deploys into $TeXLibDir, which was reassigned to the
          # junction -- so it must be visible through it.
          if (-not (Test-Path (Join-Path $junction 'CHANGELOG.md'))) {
            Write-Host "FAIL: stub bundle not visible through the junction" -ForegroundColor Red; exit 1
          }
          Write-Host "OK: %USERPROFILE%\TeXLib is a junction at the comma/space OneDrive path; bundle deployed through it." -ForegroundColor Green

  # ---------------------------------------------------------------------------
  # 4b. reuse-existing-library — FAST. Covers the RETURNING machine, which every
  #     other job misses: they all stage a texlib\ bundle and install once onto a
  #     clean VM, so $UseExistingTeXLib is never true and the Skip/Reinstall
  #     prompts are never reached. Both v0.6.1 install bugs lived in exactly that
  #     gap:
  #
  #       * section 16 deployed the Sublime builder files from $TeXLibDir\Sublime
  #         into $SublimeUserSync -- the SAME directory once Packages\User is
  #         junctioned to it -- so Copy-Item threw "Cannot overwrite the item ...
  #         with itself" and killed the install at exit 10, with every file
  #         already correctly in place.
  #       * the interactive [S]kip/[R]einstall path is dead code under -Silent.
  #
  #     Seeding the install root with empty component dirs makes the installer
  #     skip all four big downloads (TeX Live, Sublime, Sumatra, LaTeXTools), so
  #     this runs a REAL full (non--OnlyTeXLib) install in about a minute. The
  #     end-of-install pdflatex verification only WARNs when the stub bin dir has
  #     no pdflatex.exe, so a stubbed toolchain still exits 0.
  # ---------------------------------------------------------------------------
  reuse-existing-library:
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Seed a returning machine (existing library + installed components)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # NOTE: deliberately NO texlib\ bundle here. Bundle absent + library
          # already present is what sets $UseExistingTeXLib.
          $installRoot = Join-Path $env:RUNNER_TEMP 'TeXLibRoot'
          "INSTALL_ROOT=$installRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          # With OneDrive nulled below, $TeXLibDir is %USERPROFILE%\Documents\
          # TeXLib and no user-root junction is needed. Pre-flight accepts the
          # library once the three core .sty files exist.
          $lib = Join-Path $env:USERPROFILE 'Documents\TeXLib'
          New-Item -ItemType Directory -Force -Path (Join-Path $lib 'Sublime') | Out-Null
          Set-Content -Encoding UTF8 -Path (Join-Path $lib 'CHANGELOG.md') -Value "# Changelog`r`n`r`n## [Unreleased]`r`n- CI stub library (not a real release)."
          foreach ($p in 'course-metadata','texlib-build','basic-utilities') {
            $sty = "\NeedsTeXFormat{LaTeX2e}`r`n\ProvidesPackage{$p}[2026/01/01 CI stub]`r`n\endinput"
            Set-Content -Encoding UTF8 -Path (Join-Path $lib "$p.sty") -Value $sty
          }
          # The builder files section 16 deploys. Their presence HERE is what
          # makes source and destination the same path once Packages\User is
          # junctioned to $lib\Sublime.
          Set-Content -Encoding UTF8 -Path (Join-Path $lib 'Sublime\texlib_builder.py') -Value '# CI stub builder.'
          Set-Content -Encoding UTF8 -Path (Join-Path $lib 'Sublime\TeXLib.sublime-build') -Value '{ "//": "CI stub build." }'
          Set-Content -Encoding UTF8 -Path (Join-Path $lib 'Sublime\Default.sublime-commands') -Value '[]'
          Set-Content -Encoding UTF8 -Path (Join-Path $lib 'Sublime\LaTeX.sublime-settings') -Value '{ "//": "CI stub settings." }'

          # Empty component dirs are all the installer's Test-Path detection
          # needs to offer Skip -- no multi-GB downloads. TexLive\2025\bin\
          # windows must exist by that exact name ($TexLiveYear).
          New-Item -ItemType Directory -Force -Path `
            (Join-Path $installRoot 'Sublime Text\Data\Packages\LaTeXTools'), `
            (Join-Path $installRoot 'Sublime Text\Data\Lib\python38\regex'), `
            (Join-Path $installRoot 'Sumatra'), `
            (Join-Path $installRoot 'TexLive\2025\bin\windows') | Out-Null
          # Skips the regex wheel download (section 16a-2 is gated on this file).
          Set-Content -Encoding UTF8 -Path (Join-Path $installRoot 'Sublime Text\Data\Lib\python38\regex\__init__.py') -Value '# CI stub regex.'

      - name: Full install onto the seeded machine (-Silent)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:TEXLIB_INSTALLER_WRAPPED = '1'
          $env:OneDrive = ''; $env:OneDriveCommercial = ''; $env:OneDriveConsumer = ''
          $out = & powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\install.ps1 -Silent -InstallPath $env:INSTALL_ROOT 2>&1 | Out-String
          $rc = $LASTEXITCODE
          Write-Host $out
          Write-Host "install.ps1 exit code: $rc"

          # Assert on the message as well as the code: a future refactor could
          # swallow the self-copy into a warning and still "pass" on exit 0.
          if ($out -match 'with itself') {
            Write-Host "FAIL: section 16 tried to copy the builder files onto themselves." -ForegroundColor Red; exit 1
          }
          if ($out -notmatch 'Existing TeXLib library detected') {
            Write-Host "FAIL: seed did not put the installer on the `$UseExistingTeXLib path; this job is no longer testing what it claims." -ForegroundColor Red; exit 1
          }
          if ($rc -ne 0) { Write-Host "FAIL: install exited $rc on a returning machine." -ForegroundColor Red; exit $rc }
          Write-Host "OK: full install succeeded reusing an already-synced library." -ForegroundColor Green

      - name: Assert the builder files survived and Packages\User is junctioned
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $lib  = Join-Path $env:USERPROFILE 'Documents\TeXLib'
          $user = Join-Path $env:INSTALL_ROOT 'Sublime Text\Data\Packages\User'
          if (-not (Test-Path $user)) { Write-Host "FAIL: $user missing" -ForegroundColor Red; exit 1 }
          $item = Get-Item $user -Force
          if ($item.Attributes -notmatch 'ReparsePoint') {
            Write-Host "FAIL: Packages\User is not a junction" -ForegroundColor Red; exit 1
          }
          # Skipping the copy must not mean skipping the outcome: the builder has
          # to be reachable through the junction.
          if (-not (Test-Path (Join-Path $user 'texlib_builder.py'))) {
            Write-Host "FAIL: texlib_builder.py not visible through Packages\User" -ForegroundColor Red; exit 1
          }
          if ((Get-Content (Join-Path $lib 'Sublime\texlib_builder.py') -Raw) -notmatch 'CI stub builder') {
            Write-Host "FAIL: the library's builder file was clobbered" -ForegroundColor Red; exit 1
          }
          Write-Host "OK: builder reachable through the junction; library intact." -ForegroundColor Green

      - name: Re-run interactively, answering the Skip prompts on stdin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Everything is installed now, so a NON-silent re-run hits all three
          # [S]kip or [R]einstall prompts -- the path a coworker actually walks
          # and the one -Silent can never reach.
          #
          # Answers come from a FILE redirect, not `(echo s&echo s&echo s) |`:
          # cmd's `echo s&` emits a trailing space, so Read-Host would return
          # "s " -- harmless for Skip (anything but R/r skips) but silently
          # wrong the day someone extends this to test the "r" reinstall answer.
          # Redirected stdin is also closed at EOF, so the job cannot hang.
          $env:TEXLIB_INSTALLER_WRAPPED = '1'
          $env:OneDrive = ''; $env:OneDriveCommercial = ''; $env:OneDriveConsumer = ''
          Set-Content -Encoding ascii -Path answers.txt -Value "s`r`ns`r`ns"
          $cmd = "powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1 -InstallPath `"$env:INSTALL_ROOT`" < answers.txt"
          $out = & cmd /c $cmd 2>&1 | Out-String
          $rc = $LASTEXITCODE
          Write-Host $out
          Write-Host "interactive re-run exit code: $rc"

          if ($out -match 'with itself') {
            Write-Host "FAIL: self-copy regressed on the interactive path." -ForegroundColor Red; exit 1
          }
          # Assert on the Write-Host lines around the prompt, NOT on the prompt
          # text itself: with stdin redirected, Read-Host's prompt goes to the
          # console but never reaches the captured stdout (it shows up only in
          # the Start-Transcript log), so matching it would fail spuriously.
          $seen = ([regex]::Matches($out, 'is already installed\.')).Count
          if ($seen -lt 3) {
            Write-Host "FAIL: expected 3 already-installed prompts (Sublime, Sumatra, TeX Live), saw $seen." -ForegroundColor Red; exit 1
          }
          foreach ($c in 'Skipping Sublime Text','Skipping SumatraPDF','Skipping TeX Live') {
            if ($out -notmatch [regex]::Escape($c)) {
              Write-Host "FAIL: '$c' not reached -- the stdin answer did not take." -ForegroundColor Red; exit 1
            }
          }
          if ($rc -ne 0) { Write-Host "FAIL: interactive re-run exited $rc." -ForegroundColor Red; exit $rc }
          Write-Host "OK: interactive re-run skipped all three components and completed." -ForegroundColor Green

      - name: Teardown through uninstall.bat (zero args, wrapper path)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Deliberately the .bat with NO arguments -- the double-click path, and
          # the exact shape that crashed v0.6.1 ($InnerArgs = $null splatted as a
          # positional into uninstall.ps1's switch-only param block). The other
          # jobs invoke uninstall.ps1 directly and cannot catch this.
          #
          # 'Y' answers the confirmation prompt, again via file redirect: piping
          # `echo Y |` would deliver "Y " and uninstall.ps1 compares -ne "Y", so
          # the run would quietly print "Aborted." and exit 0 -- a green step
          # that uninstalled nothing.
          Set-Content -Encoding ascii -Path confirm.txt -Value "Y"
          $out = & cmd /c "uninstall.bat < confirm.txt" 2>&1 | Out-String
          $rc = $LASTEXITCODE
          Write-Host $out
          Write-Host "uninstall.bat exit code: $rc"
          if ($out -match 'positional parameter cannot be found') {
            Write-Host "FAIL: the wrapper's stray-`$null splat regressed." -ForegroundColor Red; exit 1
          }
          if ($out -notmatch 'TeXLib-Uninstaller v') {
            Write-Host "FAIL: uninstall.ps1 never got far enough to print its banner." -ForegroundColor Red; exit 1
          }
          if ($out -match 'Aborted\.') {
            Write-Host "FAIL: the confirmation answer did not take; nothing was uninstalled." -ForegroundColor Red; exit 1
          }
          if ($rc -ne 0) { Write-Host "FAIL: uninstall.bat exited $rc." -ForegroundColor Red; exit $rc }
          Write-Host "OK: uninstall.bat ran cleanly through the wrapper." -ForegroundColor Green

  # ---------------------------------------------------------------------------
  # 5. package-integrity — FAST. Builds an actual release bundle with
  #    make-release.ps1 and asserts it contains every file install.bat /
  #    uninstall.bat invoke, catching packaging gaps the other jobs miss because
  #    they run install.ps1 directly. Born from the 2026-06-15 flash-and-die:
  #    make-release omitted tools\install_wrapper.ps1, which install.bat invokes.
  #    (Actually launching install.bat headlessly is flaky -- the wrapper's
  #    Read-Host -- so that path is covered by the manual SMOKE-TEST.md instead.)
  # ---------------------------------------------------------------------------
  package-integrity:
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Build a release bundle and launch install.bat from it
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # make-release snapshots a texlib library; a stub suffices to check
          # PACKAGING completeness and that install.bat launches.
          $stub = Join-Path $env:RUNNER_TEMP 'texlib-src'
          New-Item -ItemType Directory -Force -Path $stub | Out-Null
          Set-Content -Encoding UTF8 -Path (Join-Path $stub 'CHANGELOG.md') -Value "# Changelog`r`n`r`n## [Unreleased]`r`n- stub"
          $out = Join-Path $env:RUNNER_TEMP 'rel'
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tools\make-release.ps1 -Version 0.0.0-ci -TexLibPath $stub -OutDir $out
          if ($LASTEXITCODE -ne 0) { Write-Host "FAIL: make-release exited $LASTEXITCODE" -ForegroundColor Red; exit 1 }
          $stage = Join-Path $out 'TeXLib-Installer-v0.0.0-ci'

          # Every file install.bat / uninstall.bat invoke must ship, or the .bat
          # flashes open and dies (PowerShell -File on a missing script).
          $required = @('install.bat','uninstall.bat','install.ps1','uninstall.ps1',
                        'tools\boot_wrapper.ps1',
                        'texlib','templates')
          $missing = $required | Where-Object { -not (Test-Path (Join-Path $stage $_)) }
          if ($missing) { Write-Host "FAIL: bundle missing: $($missing -join ', ')" -ForegroundColor Red; exit 1 }
          # Build/dev-only tools must NOT ship. make-release.ps1 builds the
          # bundle; dev-install-test.ps1 drives install.ps1 against a seeded
          # sandbox and is useless (and confusing) to an end user.
          foreach ($t in 'make-release.ps1','dev-install-test.ps1') {
            if (Test-Path (Join-Path $stage "tools\$t")) {
              Write-Host "FAIL: $t should not be in the bundle" -ForegroundColor Red; exit 1
            }
          }

          # The wrapper install.bat invokes must be a real, parseable script
          # (a missing/corrupt wrapper is exactly what makes install.bat flash
          # open and die).
          $werr = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile((Join-Path $stage 'tools\boot_wrapper.ps1'), [ref]$null, [ref]$werr)
          if ($werr) { Write-Host "FAIL: shipped boot_wrapper.ps1 has parse errors" -ForegroundColor Red; exit 1 }
          Write-Host "OK: release bundle contains every file install.bat needs." -ForegroundColor Green

  # ---------------------------------------------------------------------------
  # 6. full-install — SLOW, GATED. Real -Silent install on a clean throwaway VM,
  #    then -Doctor, then uninstall.ps1 -Silent teardown. Never on push: only
  #    the weekly schedule OR a manual dispatch with full=true. TeX Live full
  #    scheme + 2 apps fits well under the 6h job cap.
  # ---------------------------------------------------------------------------
  full-install:
    if: >-
      github.event.schedule == '30 4 * * 1' ||
      (github.event_name == 'workflow_dispatch' && inputs.full)
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      # Export INSTALL_ROOT FIRST so it is set even if a later step aborts — the
      # log-upload glob below depends on it. Pre-create it so the FIRST transcript
      # lands in <root>\Logs rather than %TEMP%\TeXLib-Install on a clean VM.
      - name: Export install root
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installRoot = Join-Path $env:RUNNER_TEMP 'TeXLibRoot'
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          "INSTALL_ROOT=$installRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Assemble stub texlib bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Minimal in-job stub. install.ps1 never parses/compiles the .sty during
          # install (the end verification compiles a self-contained hello.tex with
          # no \usepackage of the library), so stubs that merely EXIST satisfy
          # pre-flight 7i, section 13 deploy, and the Test-Path-guarded Sublime
          # deploy. Single-line Set-Content only — no here-strings (an indented
          # '@ / "@ terminator after YAML de-indentation is a parse error).
          New-Item -ItemType Directory -Force -Path 'texlib\Sublime' | Out-Null
          Set-Content -Encoding UTF8 -Path 'texlib\CHANGELOG.md' -Value "# Changelog`r`n`r`n## [Unreleased]`r`n- CI stub bundle (not a real release)."
          foreach ($p in 'course-metadata','texlib-build','basic-utilities') {
            $sty = "\NeedsTeXFormat{LaTeX2e}`r`n\ProvidesPackage{$p}[2026/01/01 CI stub]`r`n\endinput"
            Set-Content -Encoding UTF8 -Path ("texlib\{0}.sty" -f $p) -Value $sty
          }
          Set-Content -Encoding UTF8 -Path 'texlib\Sublime\texlib_builder.py' -Value '# CI stub builder.'
          Set-Content -Encoding UTF8 -Path 'texlib\Sublime\TeXLib.sublime-build' -Value '{ "//": "CI stub build." }'
          Set-Content -Encoding UTF8 -Path 'texlib\Sublime\Default.sublime-commands' -Value '[]'
          Set-Content -Encoding UTF8 -Path 'texlib\Sublime\LaTeX.sublime-settings' -Value '{ "//": "CI stub settings." }'

      - name: Real install (install.ps1 -Silent)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Run the installer exactly as a coworker does: powershell.exe (WinPS
          # 5.1), -Silent so no Read-Host / 'Press Enter' can hang. Null OneDrive
          # for the child so $NeedsUserRootJunction is deterministically false
          # (the load-time junction FATAL exit 12/13 is NOT gated by -Silent).
          $env:TEXLIB_INSTALLER_WRAPPED = '1'
          $env:OneDrive = ''
          $env:OneDriveCommercial = ''
          $env:OneDriveConsumer = ''
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\install.ps1 -Silent -InstallPath $env:INSTALL_ROOT
          $rc = $LASTEXITCODE
          Write-Host "install.ps1 -Silent exit code: $rc"
          exit $rc

      - name: Diagnose install (install.ps1 -Doctor)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Invoke-Doctor ALWAYS ends in Stop-Installer 0 regardless of how many
          # [FAIL] checks it printed, so its exit code has no teeth: capture
          # stdout and fail the step ourselves if Doctor reported any [FAIL].
          $env:TEXLIB_INSTALLER_WRAPPED = '1'
          $env:OneDrive = ''
          $env:OneDriveCommercial = ''
          $env:OneDriveConsumer = ''
          $out = & powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\install.ps1 -Silent -Doctor -InstallPath $env:INSTALL_ROOT 2>&1 | Out-String
          Write-Host $out
          $rc = $LASTEXITCODE
          Write-Host "install.ps1 -Doctor exit code: $rc"
          if ($rc -ne 0) {
            Write-Host "Doctor exited non-zero ($rc)." -ForegroundColor Red
            exit $rc
          }
          if ($out -match '\[FAIL\]') {
            Write-Host "Doctor reported one or more [FAIL] checks; failing the job." -ForegroundColor Red
            exit 1
          }
          Write-Host "Doctor reported no [FAIL] checks." -ForegroundColor Green

      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: install-log-${{ github.run_id }}
          # First-run transcript lands under <root>\Logs because we pre-created
          # the root; glob %TEMP%\TeXLib-Install too as a fallback (dash dir =
          # log dir; underscore dir = scratch, wiped). INSTALL_ROOT is always set.
          path: |
            ${{ env.INSTALL_ROOT }}\Logs\*.log
            ${{ runner.temp }}\TeXLib-Install\*.log
          if-no-files-found: warn
          retention-days: 14

      - name: Teardown (uninstall.bat -Silent)
        # Always run so the VM is left clean even if install/Doctor failed.
        # uninstall.ps1 -Silent is fully non-interactive and always exits 0, so
        # it never masks an earlier failure (install/Doctor own pass/fail).
        # uninstall.ps1 has NO -InstallPath param and hardcodes %LOCALAPPDATA%\
        # TeXLib, so it mainly clears the HKCU/PATH/shortcut artifacts here; the
        # $RUNNER_TEMP install root is reclaimed when the VM is discarded.
        #
        # Routed through the .bat (not uninstall.ps1 directly) so the ONE job
        # that performs a real install also tears it down through the entry
        # point a user actually double-clicks, wrapper and all. The zero-arg
        # form of this path is covered by reuse-existing-library.
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:TEXLIB_INSTALLER_WRAPPED = '1'
          $out = & cmd /c "uninstall.bat -Silent" 2>&1 | Out-String
          Write-Host $out
          if ($out -match 'positional parameter cannot be found') {
            Write-Host "FAIL: wrapper arg forwarding regressed." -ForegroundColor Red; exit 1
          }
          Write-Host "uninstall.ps1 -Silent exit code: $LASTEXITCODE"
