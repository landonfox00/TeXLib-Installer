name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  psscriptanalyzer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings PSScriptAnalyzerSettings.psd1
          if ($results) {
            $results | Format-Table -AutoSize
            $errors   = @($results | Where-Object { $_.Severity -eq 'Error' })
            $warnings = @($results | Where-Object { $_.Severity -eq 'Warning' })
            if ($errors.Count -gt 0) {
              Write-Host ("PSScriptAnalyzer found {0} error(s) and {1} warning(s)" -f $errors.Count, $warnings.Count) -ForegroundColor Red
              exit 1
            } else {
              Write-Host ("PSScriptAnalyzer found {0} warning(s), no errors" -f $warnings.Count) -ForegroundColor Yellow
            }
          } else {
            Write-Host "PSScriptAnalyzer: clean" -ForegroundColor Green
          }
