name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  psscriptanalyzer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning, Error
          if ($results) {
            $results | Format-Table -AutoSize
            $errors = $results | Where-Object { $_.Severity -eq 'Error' }
            if ($errors) {
              Write-Host "PSScriptAnalyzer found $($errors.Count) error(s) and $(($results | Where-Object { $_.Severity -eq 'Warning' }).Count) warning(s)" -ForegroundColor Red
              exit 1
            } else {
              Write-Host "PSScriptAnalyzer found $($results.Count) warning(s), no errors" -ForegroundColor Yellow
            }
          } else {
            Write-Host "PSScriptAnalyzer: clean" -ForegroundColor Green
          }
